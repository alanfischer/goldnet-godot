name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch makes an in-flight run redundant.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.7-stable"

jobs:
  # The engine-agnostic half of goldnet: goldnet_codec.h and the sequence arithmetic.
  # Deliberately free of godot-cpp, so this needs no engine and no submodules.
  #
  # tests/CMakeLists.txt turns on UBSan with -fno-sanitize-recover. That is load-bearing
  # rather than hygiene — see the comment there — so a sanitizer abort is a real failure
  # and must not be retried or downgraded.
  cpp-tests:
    name: C++ unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S tests -B tests/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build tests/build

      - name: Run
        run: ctest --test-dir tests/build --output-on-failure

  # InterpolationBuffer, PredictedBody and ServerClock — the client-side helpers the addon
  # ships as plain GDScript. These need an engine but not the GDExtension, which is what
  # makes them runnable here at all (see the note on the integration suite below).
  gdscript-tests:
    name: GDScript suites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Godot's Linux builds link X11/font libraries even when run with --headless; the
      # runner image does not carry all of them by default.
      - name: Install runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1 libxcursor1 libxinerama1 libxi6 libxrandr2

      - name: Fetch Godot ${{ env.GODOT_VERSION }}
        run: |
          url="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          curl -fsSL -o godot.zip "$url"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}_linux.x86_64" godot
          chmod +x godot
          ./godot --version

      - name: Run suites
        run: GODOT="$PWD/godot" ./tests/gdscript/run.sh

  # The nine two-process cases: a real server and client talking over a real
  # ENetMultiplayerPeer with a real GoldNetMultiplayer installed. Unlike the tiers above
  # this needs the GDExtension built, hence the submodule checkout.
  #
  # Compiling godot-cpp dominates the runtime here (several minutes). There is
  # deliberately no build cache yet: caching a CMake build tree without its CMakeCache.txt
  # tends to reconfigure and rebuild anyway, and a cache that quietly does nothing is
  # worse than none. If this job gets annoying, ccache keyed on the godot-cpp revision is
  # the thing to reach for.
  integration-tests:
    name: Integration cases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1 libxcursor1 libxinerama1 libxi6 libxrandr2

      # Debug, not Release. src/CMakeLists.txt maps that to the template_debug suffix,
      # and the Godot binary fetched below is an editor build, so goldnet.gdextension
      # resolves its linux.debug.x86_64 entry. Building Release here produces a
      # template_release .so the engine never looks for, and every case then fails at
      # "GoldNetMultiplayer missing".
      - name: Build the extension
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build -j"$(nproc)"

      - name: Fetch Godot ${{ env.GODOT_VERSION }}
        run: |
          url="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          curl -fsSL -o godot.zip "$url"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}_linux.x86_64" godot
          chmod +x godot

      - name: Run cases
        run: GODOT="$PWD/godot" ./tests/integration/run.sh

      # Each case writes a server and client log; they are the only way to tell what a
      # failure actually did, and they vanish with the runner.
      - name: Upload case logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: tests/integration/.logs/
